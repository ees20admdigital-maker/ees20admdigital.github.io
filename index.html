.bar-title{font-size:17px;font-weight:bold}
.bar-sub{font-size:11px;opacity:.7;margin-top:2px}
.strip{height:4px;background:linear-gradient(90deg,#1F3864,#2E75B6,#1B7A3E)}
.wrap{padding:14px 16px}
.hero{background:#fff;border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;border:1px solid #ddd}
.hero h2{color:#1F3864;font-size:17px}
.hero p{color:#888;font-size:12px;margin-top:3px}
.lbl{font-size:11px;font-weight:bold;color:#555;margin-bottom:6px;text-transform:uppercase}
.tfilt{display:flex;gap:6px;margin-bottom:12px}
.tfilt button{flex:1;padding:9px 4px;border-radius:8px;border:2px solid;cursor:pointer;font-size:12px;font-weight:bold}
.tf-m{background:#DBEAFE;border-color:#93C5FD;color:#1e3a5f}
.tf-t{background:#DCFCE7;border-color:#86EFAC;color:#14532d}
.tf-a{background:#F0F4F8;border-color:#ddd;color:#555}
.tf-on{border-width:3px!important}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.cb{padding:10px 4px;border-radius:8px;border:2px solid;cursor:pointer;font-size:12px;font-weight:bold;text-align:center}
.cm{border-color:#93C5FD;color:#1e3a5f;background:#DBEAFE}
.ct{border-color:#86EFAC;color:#14532d;background:#DCFCE7}
.con{border-width:3px!important;transform:scale(1.05)}
#matsec{display:none;margin-bottom:10px}
.mlist{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.mb{padding:10px 6px;border-radius:8px;background:#fff;border:2px solid #ddd;cursor:pointer;font-size:11px;font-weight:bold;text-align:center}
.mb-pr{background:#FFF2CC;border-color:#F4B942;color:#7F6000}
.mb-on{background:#1F3864!important;border-color:#1F3864!important;color:#fff!important}
.gobtn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;background:#1F3864;color:#fff;margin-top:4px}
.gobtn:disabled{background:#ccc;color:#999;cursor:not-allowed}
#p-list{display:none;padding:14px 16px}
#p-hist{display:none;padding:14px 16px}
.bk{background:none;border:1px solid #ddd;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;margin-bottom:12px;color:#1F3864;font-weight:bold}
.lhdr{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px;border:1px solid #ddd}
.lhdr h3{font-size:15px;color:#1F3864}
.lhdr p{font-size:11px;color:#888;margin-top:2px}
.stats{display:flex;gap:8px;margin-bottom:10px}
.stat{flex:1;background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #ddd}
.sn{font-size:18px;font-weight:bold}
.sl{font-size:9px;color:#888;text-transform:uppercase}
.act{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.act button{flex:1;min-width:140px;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer}
.b-tp{background:#D1FAE5;color:#065F46}
.b-gd{background:#1F3864;color:#fff}
.b-hist{background:#FFF2CC;color:#7F6000}
.ar{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:5px;border:1px solid #ddd;border-left:4px solid #ddd;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ar.P{border-left-color:#1B7A3E!important;background:#F0FFF4}
.ar.A{border-left-color:#C0392B!important;background:#FFF5F5}
.ar.T{border-left-color:#B7860B!important;background:#FFFDE7}
.ar.S{border-left-color:#666!important;background:#F5F5F5}
.anum{width:22px;height:22px;border-radius:50%;background:#E0E7EF;color:#333;font-size:10px;font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.aname{flex:1;font-size:13px;font-weight:bold;color:#1F3864;min-width:100px}
.bgrp{display:flex;gap:4px;flex-shrink:0}
.be{padding:7px 9px;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer}
.bP{background:#D1FAE5;color:#065F46}.bP.on{background:#1B7A3E;color:#fff}
.bA{background:#FEE2E2;color:#991B1B}.bA.on{background:#C0392B;color:#fff}
.bT{background:#FEF3C7;color:#92400E}.bT.on{background:#B7860B;color:#fff}
.bS{background:#F3F4F6;color:#4B5563}.bS.on{background:#6B7280;color:#fff}
.acta-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;flex-shrink:0}
.acta-box{display:none;width:100%;padding:6px 0}
.acta-box label{font-size:10px;color:#B7860B;font-weight:bold;text-transform:uppercase;display:block;margin-bottom:3px}
.acta-box textarea{width:100%;padding:8px;border:2px solid #F4B942;border-radius:8px;font-size:12px;resize:vertical;min-height:55px;background:#FFFDE7;font-family:Arial,sans-serif}
.frow{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.frow label{font-size:12px;color:#888;font-weight:bold}
.frow input{border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:13px}
.hist-hdr{background:#1F3864;color:#fff;border-radius:10px;padding:14px;margin-bottom:12px;text-align:center}
.hist-hdr h3{font-size:16px}
.hist-pct{font-size:40px;font-weight:bold;margin:8px 0}
.hist-sub{font-size:12px;opacity:.8}
.al-card{background:#fff;border-radius:8px;padding:12px;margin-bottom:6px;border:1px solid #ddd;cursor:pointer}
.al-top{display:flex;align-items:center;gap:10px}
.al-name{flex:1;font-size:13px;font-weight:bold}
.al-pct{font-size:13px;font-weight:bold;padding:3px 10px;border-radius:20px}
.ok{background:#D1FAE5;color:#065F46}
.warn{background:#FEF3C7;color:#92400E}
.bad{background:#FEE2E2;color:#991B1B}
.al-det{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #eee;font-size:12px}
.det-row{display:flex;justify-content:space-between;padding:3px 0}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1F3864;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:bold;display:none;z-index:999}
</style>
</head>
<body>
<div class="bar">
  <div class="bar-title">EES N20 Don Orione - Asistencia 2026</div>
  <div class="bar-sub" id="bsub">Claypole</div>
</div>
<div class="strip"></div>

<!-- PAGINA SELECCION -->
<div class="wrap" id="p-sel">
  <div class="hero"><h2>Lista de Asistencia 2026</h2><p>Selecciona tu curso y materia</p></div>
  <div class="lbl">Turno</div>
  <div class="tfilt">
    <button class="tf-m" id="btn-M" onclick="filtT('M')">Manana</button>
    <button class="tf-t" id="btn-T" onclick="filtT('T')">Tarde</button>
    <button class="tf-a tf-on" id="btn-X" onclick="filtT('')">Todos</button>
  </div>
  <div class="lbl">Curso</div>
  <div class="cgrid" id="cgrid"></div>
  <div id="matsec">
    <div class="lbl">Materia</div>
    <div class="mlist" id="mlist"></div>
  </div>
  <button class="gobtn" id="gobtn" disabled onclick="goList()">Tomar lista</button>
</div>

<!-- PAGINA LISTA -->
<div id="p-list">
  <button class="bk" onclick="goSel()">Volver</button>
  <div id="lc" style="padding:0 16px 16px"></div>
</div>

<!-- PAGINA HISTORIAL -->
<div id="p-hist">
  <button class="bk" onclick="goList()">Volver a la lista</button>
  <div id="hc" style="padding:0 16px 16px"></div>
</div>

<div class="toast" id="tk"></div>

<script>
var _d=JSON.parse(document.getElementById('D').textContent);
var COURSES=_d.courses, STUDENTS=_d.students, MATERIAS=_d.materias;
var TURNOS=_d.turnos, MNAMES=_d.mnames, API=_d.api;
var selC=-1, selM=-1, filt='', estados={}, actaM={};

function pad(n){return String(n).padStart(2,'0');}
function toISO(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtD(s){var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function toast(m,t){var e=document.getElementById('tk');e.textContent=m;e.style.display='block';setTimeout(function(){e.style.display='none';},t||2500);}

function showPage(p){
  ['p-sel','p-list','p-hist'].forEach(function(id){
    document.getElementById(id).style.display=id===p?'block':'none';
  });
}
function goSel(){showPage('p-sel');}
function goList(){showPage('p-list');buildList();}
function goHist(){showPage('p-hist');loadHist();}

function filtT(t){
  filt=t;
  ['M','T','X'].forEach(function(x){var b=document.getElementById('btn-'+x);if(b)b.classList.remove('tf-on');});
  document.getElementById('btn-'+(t===''?'X':t)).classList.add('tf-on');
  buildGrid();
}

function buildGrid(){
  var g=document.getElementById('cgrid');
  g.innerHTML='';
  for(var i=0;i<COURSES.length;i++){
    var t=TURNOS[i];
    if(filt && t!==filt) continue;
    var b=document.createElement('button');
    b.className='cb '+(t==='M'?'cm':'ct')+(i===selC?' con':'');
    b.textContent=COURSES[i];
    b.onclick=(function(idx){return function(){selCourse(idx);};})(i);
    g.appendChild(b);
  }
}

function selCourse(idx){
  selC=idx; selM=-1;
  buildGrid();
  var g=document.getElementById('mlist');
  g.innerHTML='';
  for(var i=0;i<MATERIAS[idx].length;i++){
    var m=MATERIAS[idx][i];
    var b=document.createElement('button');
    b.className='mb'+(m==='PR'?' mb-pr':'');
    b.textContent=m==='PR'?'PR - Preceptoria':(MNAMES[m]||m);
    b.onclick=(function(mi){return function(){selMat(mi);};})(i);
    g.appendChild(b);
  }
  document.getElementById('matsec').style.display='block';
  document.getElementById('gobtn').disabled=true;
  document.getElementById('bsub').textContent=COURSES[idx]+' - '+(TURNOS[idx]==='M'?'Manana':'Tarde');
}

function selMat(idx){
  selM=idx;
  var btns=document.getElementById('mlist').querySelectorAll('button');
  for(var i=0;i<btns.length;i++) btns[i].classList.toggle('mb-on',i===idx);
  document.getElementById('gobtn').disabled=false;
}

function buildList(){
  estados={}; actaM={};
  var curso=COURSES[selC], mat=MATERIAS[selC][selM];
  var mn=mat==='PR'?'Preceptoria':(MNAMES[mat]||mat);
  var t=TURNOS[selC], alumnos=STUDENTS[selC];
  var lc=document.getElementById('lc');
  lc.innerHTML='';

  function mk(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt)e.textContent=txt;return e;}

  var hdr=mk('div','lhdr'); hdr.innerHTML='<h3>'+curso+' - '+mn+'</h3><p>'+(t==='M'?'Manana':'Tarde')+'</p>';
  var fr1=mk('div','frow'); fr1.innerHTML='<label>Fecha:</label><input type="date" id="df" value="'+toISO()+'">';
  var fr2=mk('div','frow'); fr2.innerHTML='<label>N clase:</label><input type="number" id="nc" value="1" min="1" max="99" style="width:70px;text-align:center">';
  var sts=mk('div','stats'); sts.innerHTML=
    '<div class="stat"><div class="sn" id="cp" style="color:#1B7A3E">0</div><div class="sl">Presentes</div></div>'+
    '<div class="stat"><div class="sn" id="ca" style="color:#C0392B">0</div><div class="sl">Ausentes</div></div>'+
    '<div class="stat"><div class="sn" id="ct" style="color:#B7860B">0</div><div class="sl">Tardanzas</div></div>'+
    '<div class="stat"><div class="sn" id="cs" style="color:#666">0</div><div class="sl">Sin trabajar</div></div>';
  var act=mk('div','act');
  var btp=mk('button','b-tp','Todos presentes'); btp.onclick=todosP;
  var bgd=mk('button','b-gd','Guardar lista'); bgd.onclick=guardar;
  var bhs=mk('button','b-hist','📋 Ver historial'); bhs.id='btn-hist'; bhs.onclick=goHist;
  act.appendChild(btp); act.appendChild(bgd); act.appendChild(bhs);

  lc.appendChild(hdr); lc.appendChild(fr1); lc.appendChild(fr2); lc.appendChild(sts); lc.appendChild(act);

  for(var i=0;i<alumnos.length;i++){
    var ar=mk('div','ar'); ar.id='ar'+i;
    var num=mk('div','anum',String(i+1));
    var nm=mk('div','aname',alumnos[i]);
    var abt=mk('button','acta-btn','📎');
    abt.onclick=(function(idx){return function(){var b=document.getElementById('ab'+idx);b.style.display=b.style.display==='block'?'none':'block';};})(i);
    var bg=mk('div','bgrp');
    var ests=['P','A','T','S'];
    for(var j=0;j<ests.length;j++){
      var be=mk('button','be b'+ests[j],ests[j]);
      be.id='b'+ests[j]+i;
      be.onclick=(function(ii,ee){return function(){setE(ii,ee);};})(i,ests[j]);
      bg.appendChild(be);
    }
    ar.appendChild(num); ar.appendChild(nm); ar.appendChild(abt); ar.appendChild(bg);
    lc.appendChild(ar);
    var ab=mk('div','acta-box'); ab.id='ab'+i;
    var al=mk('label','','Acta / Observacion libre');
    var at=document.createElement('textarea'); at.placeholder='Escribe lo que quieras sobre este alumno...';
    at.oninput=(function(idx){return function(){actaM[idx]=this.value;};})(i);
    ab.appendChild(al); ab.appendChild(at);
    lc.appendChild(ab);
  }
}

function setE(i,e){
  estados[i]=e;
  document.getElementById('ar'+i).className='ar '+e;
  var ests=['P','A','T','S'];
  for(var j=0;j<ests.length;j++){
    var b=document.getElementById('b'+ests[j]+i);
    if(b) b.classList.toggle('on',ests[j]===e);
  }
  updStats();
}

function todosP(){for(var i=0;i<STUDENTS[selC].length;i++) setE(i,'P');}

function updStats(){
  var c={P:0,A:0,T:0,S:0};
  var keys=Object.keys(estados);
  for(var i=0;i<keys.length;i++){var e=estados[keys[i]];if(c[e]!==undefined)c[e]++;}
  document.getElementById('cp').textContent=c.P;
  document.getElementById('ca').textContent=c.A;
  document.getElementById('ct').textContent=c.T;
  document.getElementById('cs').textContent=c.S;
}

async function guardar(){
  var curso=COURSES[selC], mat=MATERIAS[selC][selM];
  var alumnos=STUDENTS[selC];
  var fecha=fmtD(document.getElementById('df').value);
  var nclase=parseInt(document.getElementById('nc').value)||1;
  var rows=[];
  for(var i=0;i<alumnos.length;i++){
    if(estados[i]) rows.push({curso:curso,materia:mat,nombre:alumnos[i],
      estado:estados[i],fecha:fecha,nclase:nclase,obs:''});
  }
  if(!rows.length){toast('Marca al menos un alumno');return;}
  try{
    toast('Guardando...',6000);
    await fetch(API,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'guardar',rows:rows})
    });
    toast('Lista guardada correctamente',3000);
  } catch(ex){
    toast('Sin conexion - verificar internet',4000);
  }
}

async function loadHist(){
  var curso=COURSES[selC], mat=MATERIAS[selC][selM];
  var mn=mat==='PR'?'Preceptoria':(MNAMES[mat]||mat);
  var hc=document.getElementById('hc');
  hc.innerHTML='<div style="text-align:center;padding:30px;color:#888">Cargando historial...</div>';
  try{
    var r=await fetch(API+'?action=resumen');
    var j=await r.json();
    if(!j.ok) throw new Error();
    var rows=[];
    for(var i=0;i<j.rows.length;i++){
      if(j.rows[i].curso===curso && j.rows[i].materia===mat) rows.push(j.rows[i]);
    }
    if(!rows.length){
      hc.innerHTML='<div style="text-align:center;padding:30px;color:#888">Sin registros para este curso y materia</div>';
      return;
    }
    var byAl={};
    for(var i=0;i<rows.length;i++){
      var rr=rows[i];
      if(!byAl[rr.nombre]) byAl[rr.nombre]={P:0,A:0,T:0,S:0,tot:0,actas:[]};
      if(byAl[rr.nombre][rr.estado]!==undefined) byAl[rr.nombre][rr.estado]++;
      byAl[rr.nombre].tot++;
      if(rr.acta && rr.acta.trim()) byAl[rr.nombre].actas.push({fecha:rr.fecha,txt:rr.acta});
    }
    var clases=new Set();
    for(var i=0;i<rows.length;i++) clases.add(rows[i].fecha+'|'+rows[i].nclase);
    var totP=0;
    for(var i=0;i<rows.length;i++) if(rows[i].estado==='P'||rows[i].estado==='T') totP++;
    var pctG=Math.round(totP/rows.length*100);

    var html='<div class="hist-hdr"><h3>'+curso+' — '+mn+'</h3>'
      +'<div class="hist-pct">'+pctG+'%</div>'
      +'<div class="hist-sub">Asistencia general — '+clases.size+' clases registradas</div></div>';

    var names=Object.keys(byAl).sort(function(a,b){
      var pa=Math.round((byAl[a].P+byAl[a].T)/byAl[a].tot*100);
      var pb=Math.round((byAl[b].P+byAl[b].T)/byAl[b].tot*100);
      return pa-pb;
    });

    for(var i=0;i<names.length;i++){
      var nm=names[i], d=byAl[nm];
      var pct=Math.round((d.P+d.T)/d.tot*100);
      var cls=pct>=75?'ok':pct>=50?'warn':'bad';
      html+='<div class="al-card" onclick="tglDet('+i+')">'
        +'<div class="al-top"><div class="al-name">'+nm+'</div>'
        +'<div class="al-pct '+cls+'">'+pct+'%</div></div>'
        +'<div class="al-det" id="det'+i+'">'
        +'<div class="det-row"><span>Presentes</span><b style="color:#1B7A3E">'+d.P+'</b></div>'
        +'<div class="det-row"><span>Ausentes</span><b style="color:#C0392B">'+d.A+'</b></div>'
        +'<div class="det-row"><span>Tardanzas</span><b style="color:#B7860B">'+d.T+'</b></div>'
        +'<div class="det-row"><span>Sin trabajar</span><b style="color:#666">'+d.S+'</b></div>'
        +'<div class="det-row"><span>Total clases</span><b>'+d.tot+'</b></div>';
      if(d.actas.length){
        html+='<div style="margin-top:8px;padding-top:6px;border-top:1px dashed #ddd">'
          +'<div style="font-size:10px;font-weight:bold;color:#B7860B;margin-bottom:4px">ACTAS</div>';
        for(var k=0;k<d.actas.length;k++){
          html+='<div style="background:#FFFDE7;padding:6px 8px;border-radius:6px;margin-bottom:4px;font-size:11px">'
            +'<span style="color:#888">'+d.actas[k].fecha+':</span> '+d.actas[k].txt+'</div>';
        }
        html+='</div>';
      }
      html+='</div></div>';
    }
    hc.innerHTML=html;
  } catch(ex){
    hc.innerHTML='<div style="text-align:center;padding:30px;color:#888">Sin conexion o sin datos</div>';
  }
}

function tglDet(i){
  var d=document.getElementById('det'+i);
  if(d) d.style.display=d.style.display==='block'?'none':'block';
}

showPage('p-sel');
buildGrid();
</script>
</body>
</html>
